services:
  plex:
    image: lscr.io/linuxserver/plex:1.43.2
    pull_policy: always
    restart: always
    network_mode: host
    env_file: .env
    environment:
      - VERSION=docker
    devices:
      - "/dev/dri:/dev/dri"
    volumes:
      - "${BASE_FOLDER:?error}/config/plex:/config"
      - "${BASE_FOLDER:?error}/media:/media"
      - "${LOCAL_CACHE_FOLDER:?error}/plex:/local_cache"

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.19
    pull_policy: always
    restart: always
    expose:
      - 8989
    env_file: .env
    volumes:
      - "${BASE_FOLDER:?error}/config/sonarr:/config"
      - "${BASE_FOLDER:?error}/media:/media"

  radarr:
    image: lscr.io/linuxserver/radarr:6.2.1
    pull_policy: always
    restart: always
    expose:
      - 7878
    env_file: .env
    volumes:
      - "${BASE_FOLDER:?error}/config/radarr:/config"
      - "${BASE_FOLDER:?error}/media:/media"

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:14.3.9
    pull_policy: always
    restart: always
    expose:
      - 8080
    ports:
      - 6881:6881
      - 6881:6881/udp
    env_file: .env
    environment:
      - TORRENTING_PORT=6881
    volumes:
      - "${BASE_FOLDER:?error}/config/qbittorrent:/config"
      - "${BASE_FOLDER:?error}/media:/media"

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.4.0
    pull_policy: always
    restart: always
    expose:
      - 9696
    env_file: .env
    volumes:
      - "${BASE_FOLDER:?error}/config/prowlarr:/config"

  jackett:
    image: lscr.io/linuxserver/jackett:0.24.1226
    pull_policy: always
    restart: always
    expose:
      - 9117
    env_file: .env
    volumes:
      - "${BASE_FOLDER:?error}/config/jackett:/config"

  heimdall:
    image: lscr.io/linuxserver/heimdall:2.7.6
    pull_policy: always
    restart: always
    expose:
      - 80
    environment:
      - PUID=1000
      - PGID=1000
    env_file: .env
    volumes:
      - "${BASE_FOLDER:?error}/config/heimdall:/config"

  caddy:
    pull_policy: build
    build: ./caddy
    restart: always
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN:?error}
      ACME_EAB_KEY_ID: ${ACME_EAB_KEY_ID:?error}
      ACME_EAB_MAC_KEY: ${ACME_EAB_MAC_KEY:?error}
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - "${BASE_FOLDER:?error}/config/caddy/data:/data"
      - "${BASE_FOLDER:?error}/config/caddy/config:/config"

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.5.0
    pull_policy: always
    restart: always
    expose:
      - 8191
    env_file: .env

  profilarr:
    image: ghcr.io/dictionarry-hub/profilarr:2.0.9
    pull_policy: always
    restart: always
    expose:
      - 6868
    environment:
      AUTH: oidc
      OIDC_DISCOVERY_URL: "${OIDC_DISCOVERY_URL:?error}"
      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID:?error}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:?error}"
      ORIGIN: "https://profilarr.${BASE_DOMAIN:?error}"
    env_file: .env
    volumes:
      - "${BASE_FOLDER:?error}/config/profilarr/config:/config"
